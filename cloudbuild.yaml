# Continuous deployment: build the Dockerfile, push to Artifact Registry, and
# deploy to Cloud Run. Referenced by a Cloud Build trigger on push to main.
#
# Env vars and secrets are configured ON THE SERVICE and persist across
# revisions, so the deploy step only swaps the image and re-asserts the
# load-bearing scaling flags (see scripts/deploy.sh for the same rationale).
substitutions:
  _REGION: asia-southeast1
  _SERVICE: math-trainer
  _REPO: cloud-run-source-deploy

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --max-instances=1
      - --session-affinity
      - --no-cpu-throttling
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
